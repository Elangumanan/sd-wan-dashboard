<div class="card">
  <div class="card__header">
    <div class="card__header-left">
      <h3 class="card__title">{{ title() }}</h3>
      @if (description()) {
        <p class="card__description">{{ description() }}</p>
      }
    </div>
    <div class="card__header-actions">
      <ng-content select="[card-actions]" />
    </div>
  </div>
  <div class="card__body">
    <ng-content />
  </div>
</div>
